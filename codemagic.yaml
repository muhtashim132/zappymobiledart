# codemagic.yaml — Enything (ZappyMobile)
# Builds iOS IPA in the cloud using Codemagic's macOS M2 runners.
# Sign up free at: https://codemagic.io
#
# HOW TO USE:
#   1. Push your project to GitHub
#   2. Go to codemagic.io → Add application → Select repo
#   3. Choose "Flutter App" workflow type
#   4. Add the secrets listed under environment.vars below in Codemagic UI
#   5. Trigger a build

workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60  # minutes
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # ── Set these in Codemagic UI → Environment Variables ──────────────
        # SUPABASE_URL         → your Supabase project URL
        # SUPABASE_ANON_KEY    → your Supabase anon key
        # RAZORPAY_KEY         → your Razorpay key
        # FAST2SMS_API_KEY     → your Fast2SMS API key
        # MAPBOX_TOKEN         → your Mapbox token
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(...)  # Replace after adding in Codemagic UI
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(...)       # Replace after adding in Codemagic UI
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(...)     # Replace after adding in Codemagic UI
        CERTIFICATE_PRIVATE_KEY: Encrypted(...)           # Replace after adding in Codemagic UI

    scripts:
      # 1. Create .env file from Codemagic environment variables
      - name: Create .env file
        script: |
          cat > $CM_BUILD_DIR/.env << EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          RAZORPAY_KEY=$RAZORPAY_KEY
          FIREBASE_SERVER_KEY=placeholder_key
          FAST2SMS_API_KEY=$FAST2SMS_API_KEY
          MAPBOX_TOKEN=$MAPBOX_TOKEN
          EOF

      # 2. Get Flutter dependencies
      - name: Flutter pub get
        script: flutter pub get

      # 3. Install CocoaPods dependencies
      - name: Pod install
        script: |
          cd ios
          pod install

      # 4. Set up iOS code signing (automatic via App Store Connect API)
      #    Only needed when you have an Apple Developer account.
      #    Comment this step out for unsigned test builds.
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $(xcode-project detect-bundle-id) \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # 5. Build the iOS IPA
      - name: Flutter build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      # Uncomment to publish to TestFlight automatically
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true

      # Email notification on build completion
      email:
        recipients:
          - your-email@example.com  # Replace with your email
        notify:
          success: true
          failure: true

  # ── Unsigned iOS build (no Apple account needed, for testing) ────────────
  ios-unsigned:
    name: iOS Unsigned Build (No Apple Account)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Create .env file
        script: |
          cat > $CM_BUILD_DIR/.env << EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          RAZORPAY_KEY=$RAZORPAY_KEY
          FIREBASE_SERVER_KEY=placeholder_key
          FAST2SMS_API_KEY=$FAST2SMS_API_KEY
          MAPBOX_TOKEN=$MAPBOX_TOKEN
          EOF

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      # Build without signing — produces an .app for Simulator testing
      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
