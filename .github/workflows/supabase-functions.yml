name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - master
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy delete-user function
        run: supabase functions deploy delete-user --project-ref $PROJECT_ID
        
      - name: Deploy process-refund function
        run: supabase functions deploy process-refund --project-ref $PROJECT_ID
        
      - name: Deploy send-push function
        run: supabase functions deploy send-push --project-ref $PROJECT_ID
