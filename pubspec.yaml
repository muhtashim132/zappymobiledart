name: zappymobilenew
description: "Zappy - Everything You Need, Delivered Instantly"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  supabase_flutter: ^2.3.0
  flutter_dotenv: ^6.0.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  latlong2: ^0.9.0
  geolocator: ^13.0.2
  fl_chart: ^0.68.0
  image_picker: ^1.0.5
  http: ^1.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.2
  uuid: ^4.2.1
  timeago: ^3.6.0
  fluttertoast: ^8.2.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2
  flutter_slidable: ^3.1.0
  flutter_map: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/google_fonts/
